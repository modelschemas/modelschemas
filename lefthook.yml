pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: '*.{js,ts,tsx,json,jsonc,md,css}'
      run: bunx prettier --check {staged_files}
    - name: lint
      glob: '*.{js,ts,tsx}'
      run: bunx eslint --no-warn-ignored {staged_files}
    - name: typecheck
      run: bun run typecheck
